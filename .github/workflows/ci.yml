name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-ci-placeholder
          SMTP_USER: test@example.com
          SMTP_PASS: testpass
        run: pytest tests/ -v --tb=short

      - name: Check imports
        env:
          OPENAI_API_KEY: sk-test-ci-placeholder
          SMTP_USER: test@example.com
          SMTP_PASS: testpass
        run: python -c "from src.crm.database import init_db; from src.prospecting.scorer import _base_score; print('Imports OK')"
