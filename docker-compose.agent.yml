version: '3.8'
services:
  curbsite-agent:
    build: .
    container_name: curbsite-agent
    restart: unless-stopped
    # Scheduler daemon: runs pipeline Mon–Fri 8am, follow-ups 9am, report Mon 7am.
    # Use `docker compose -f docker-compose.agent.yml run --rm curbsite-agent python main.py <cmd>`
    # for one-off manual runs.
    command: python -m src.scheduler
    env_file: .env
    network_mode: host
    volumes:
      - ./data:/app/data

  curbsite-webhook:
    build: .
    container_name: curbsite-webhook
    restart: unless-stopped
    command: python -m src.payments.stripe_webhook
    env_file: .env
    network_mode: host
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhook.rule=Host(`curbsite.co`) && PathPrefix(`/webhook`)"
      - "traefik.http.routers.webhook.entrypoints=websecure"
      - "traefik.http.routers.webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.webhook.loadbalancer.server.port=5001"

  curbsite-dashboard:
    build: .
    container_name: curbsite-dashboard
    restart: unless-stopped
    command: python -m src.dashboard.app
    env_file: .env
    network_mode: host
    volumes:
      - ./data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`curbsite.co`) && PathPrefix(`/crm/analytics`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=5002"

  curbsite-unsubscribe:
    build: .
    container_name: curbsite-unsubscribe
    restart: unless-stopped
    command: python -m src.outreach.unsubscribe
    env_file: .env
    network_mode: host
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.unsub.rule=Host(`curbsite.co`) && PathPrefix(`/unsubscribe`)"
      - "traefik.http.routers.unsub.entrypoints=websecure"
      - "traefik.http.routers.unsub.tls.certresolver=letsencrypt"
      - "traefik.http.services.unsub.loadbalancer.server.port=5003"

  # nginx serves preview mockups on port 8081 (host network, avoids conflict with
  # Traefik which already owns port 80/443 on the host).
  curbsite-previews:
    image: nginx:alpine
    container_name: curbsite-previews
    restart: unless-stopped
    network_mode: host
    command: >
      /bin/sh -c "sed -i 's/listen       80;/listen       8081;/g;
      s/listen  \[::\]:80;/listen  [::]:8081;/g'
      /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    volumes:
      - /public_html/previews:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.previews.rule=Host(`preview.curbsite.co`)"
      - "traefik.http.routers.previews.entrypoints=websecure"
      - "traefik.http.routers.previews.tls.certresolver=letsencrypt"
      - "traefik.http.services.previews.loadbalancer.server.port=8081"
